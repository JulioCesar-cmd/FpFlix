<div class="profile-wrapper" @fadeIn>

  <!-- HEADER DO PERFIL -->
  <header class="profile-header">
    <div class="container d-flex align-items-center gap-4">
      <div class="avatar-circle">
        {{ userName | slice:0:1 }}
      </div>
      <div class="user-info">
        <h1 class="display-5 fw-bold text-green mb-0">{{ userName }}</h1>
        <p class="text-white-50">{{ userEmail }}</p>
        <button class="btn btn-outline-danger btn-sm" (click)="logout()">
          <i class="bi bi-box-arrow-right me-2"></i>Sair da Conta
        </button>
      </div>
    </div>
  </header>

  <div class="container-fluid mt-5 px-4">

    <!-- SEÇÃO: MEUS FAVORITOS -->
    <section class="mb-5" *ngIf="favoritos.length > 0">
      <h2 class="section-title">
        <i class="bi bi-heart-fill text-danger me-2"></i> Minha Lista
      </h2>
      <app-movie-row [movies]="favoritos"></app-movie-row>
    </section>

    <!-- SEÇÃO: AVALIADOS COM LIKE -->
    <section class="mb-5" *ngIf="assistidos.length > 0">
      <h2 class="section-title">
        <i class="bi bi-hand-thumbs-up-fill text-green me-2"></i> Filmes que você curtiu
      </h2>
      <app-movie-row [movies]="assistidos"></app-movie-row>
    </section>

    <!-- MENSAGEM CASO ESTEJA VAZIO -->
    <div *ngIf="!isLoading && favoritos.length === 0" class="text-center py-5">
      <i class="bi bi-film fs-1 text-white-50"></i>
      <h3 class="mt-3 text-white-50">Sua lista está vazia.</h3>
      <p>Explore o catálogo e clique no coração para salvar filmes aqui!</p>
    </div>

  </div>
</div>
