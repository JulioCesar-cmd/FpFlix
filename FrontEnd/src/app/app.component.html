<div class="min-vh-100" style="background-color: #141414;">
  <nav class="navbar sticky-top shadow-sm py-3" style="background-color: rgba(20, 20, 20, 0.95); border-bottom: 2px solid #00a859; backdrop-filter: blur(10px); z-index: 1000;">
    <div class="container-fluid px-4">

      <div class="d-flex align-items-center">
        <span class="navbar-brand mb-0 h1 fw-bold me-4" routerLink="/" style="cursor: pointer; font-size: 1.8rem; letter-spacing: 1px;">
          <span style="color: #00a859;">FPF</span><span class="text-white">FLIX</span>
        </span>
      </div>

      <div class="d-flex align-items-center flex-grow-1 justify-content-end">

        <div class="search-wrapper me-4 d-none d-md-block" style="width: 300px;">
          <div class="input-group">
            <span class="input-group-text border-0 bg-dark text-white-50" style="border-radius: 20px 0 0 20px; cursor: default;">
              🔍
            </span>
            <input
              type="text"
              class="form-control border-0 bg-dark text-white shadow-none"
              placeholder="Títulos, gêneros..."
              style="border-radius: 0 20px 20px 0; font-size: 0.9rem;"
              [(ngModel)]="searchTerm"
              (input)="onSearchChange()">
          </div>
        </div>

        <div *ngIf="isLoggedIn" class="d-none d-lg-flex me-4">
          <a class="nav-link text-white-50 small fw-bold" routerLink="/" routerLinkActive="text-white">Início</a>
        </div>

        <div *ngIf="!isLoggedIn" class="d-flex">
          <button class="btn btn-outline-light btn-sm me-2 border-0 fw-bold" routerLink="/login">Entrar</button>
          <button class="btn btn-sm px-4 fw-bold rounded-pill" routerLink="/register" style="background-color: #00a859; color: white;">
            Cadastrar-se
          </button>
        </div>

        <div *ngIf="isLoggedIn" class="d-flex align-items-center position-relative dropdown-container">
          <div class="d-flex align-items-center" (click)="toggleMenu($event)" style="cursor: pointer;">
            <div class="avatar-circle me-2 d-flex align-items-center justify-content-center shadow"
                 style="width: 35px; height: 35px; background-color: #00a859; border-radius: 50%; color: white; font-weight: bold; border: 2px solid rgba(255,255,255,0.2);">
              {{ username.charAt(0) | uppercase }}
            </div>
            <span class="text-white-50 small arrow-icon" [style.transform]="isMenuOpen ? 'rotate(180deg)' : 'rotate(0deg)'" style="transition: transform 0.3s; display: inline-block;">▼</span>
          </div>

          <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark shadow-lg border-0 mt-3 p-2"
              [class.show]="isMenuOpen"
              [style.display]="isMenuOpen ? 'block' : 'none'"
              style="background-color: #1a1a1a; position: absolute; top: 100%; right: 0; min-width: 180px; border-radius: 8px; z-index: 1100;">
            <li>
              <a class="dropdown-item py-2 rounded d-flex align-items-center" routerLink="/favoritos" (click)="isMenuOpen = false">
                <i class="bi bi-heart-fill me-2 text-danger"></i> Minha Lista
              </a>
            </li>
            <li><hr class="dropdown-divider bg-secondary opacity-25"></li>
            <li>
              <a class="dropdown-item py-2 text-danger rounded d-flex align-items-center" (click)="logout(); isMenuOpen = false" style="cursor: pointer;">
                <i class="bi bi-box-arrow-right me-2"></i> Sair do FPF FLIX
              </a>
            </li>
          </ul>
        </div>

      </div>
    </div>
  </nav>

  <main [@routeAnimations]="prepareRoute(outlet)">
    <router-outlet #outlet="outlet"></router-outlet>
  </main>
</div>
